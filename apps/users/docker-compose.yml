version: "3.8"

services:
  # PostgreSQL Database
  users-postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: users_admin
      POSTGRES_PASSWORD: users_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - users-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U users_admin -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Users Microservice
  users-service:
    build:
      context: ../../
      dockerfile: apps/users/dockerfile
    command: pnpm run start users
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: users-postgres
      DB_PORT: 5432
      DB_USERNAME: users_admin
      DB_PASSWORD: users_password_2024
      DB_DATABASE: users_db
      MICROSERVICE_PORT: 5001
    ports:
      - "5001:5001"
    depends_on:
      users-postgres:
        condition: service_healthy
    networks:
      - users-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5001/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

networks:
  users-network:
    driver: bridge
